services:
  postgres:
    image: postgres:18-alpine
    platform: linux/amd64
    container_name: ${APP_NAME:-laravel}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-laravel}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - laravel
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-password}

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-laravel}_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel
    depends_on:
      - app

  # Terminates TLS for tenant custom domains + free subdomains and proxies plaintext
  # to nginx, which is left unchanged. Only caddy's 80/443 are published to the host;
  # nginx's own port stays reachable only within the docker network, which is what
  # keeps /internal/domains/ask (the on-demand TLS "ask" gate) from being reachable
  # from the public internet.
  caddy:
    image: caddy:2-alpine
    container_name: ${APP_NAME:-laravel}_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Platform's own primary domain, e.g. shops.yourplatform.com — must match one
      # entry in CENTRAL_DOMAINS and TENANT_DOMAIN_TARGET in the app's .env.
      - PLATFORM_DOMAIN=${PLATFORM_DOMAIN:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - laravel
    depends_on:
      - nginx

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  laravel:
    driver: bridge

